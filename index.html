<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="analysis-data-file" content="data/frost.json">
  <title>游戏前期体验拆解</title>
  <style>:root {
  color-scheme: dark;
  --bg: #0b1018;
  --panel: #131b27;
  --panel-2: #182334;
  --line: #2a3950;
  --text: #edf3fb;
  --muted: #94a6bd;
  --accent: #66e3c4;
  --hot: #ff8364;
  --low: #ad79ff;
  --flow: #65a9ff;
  font-family: "Microsoft YaHei UI", "PingFang SC", system-ui, sans-serif;
}

* { box-sizing: border-box; }
html { max-width: 100%; overflow-x: hidden; scroll-behavior: smooth; }
body { min-width: 0; margin: 0; overflow-x: hidden; background: radial-gradient(circle at 85% 0, #17243a 0, var(--bg) 32rem); color: var(--text); }
button, input, select { font: inherit; }
button { cursor: pointer; }
button:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.hero, main { width: min(100%, 1480px); margin: auto; padding: 24px 32px; }
.hero { display: flex; justify-content: space-between; gap: 24px; align-items: end; border-bottom: 1px solid var(--line); }
h1 { margin: 3px 0 6px; font-size: clamp(28px, 4vw, 48px); }
h2, h3, p { margin-top: 0; }
h2, h3 { margin-bottom: 0; }
.eyebrow { margin: 0; color: var(--accent); font-size: 12px; font-weight: 800; letter-spacing: .14em; }
.muted { color: var(--muted); }
.hero-tools { display: grid; justify-items: end; gap: 10px; }
.dataset-picker { display: grid; min-width: 190px; gap: 5px; color: var(--muted); font-size: 11px; }
.dataset-picker select { width: 100%; border: 1px solid var(--accent); border-radius: 9px; padding: 8px 34px 8px 11px; background: var(--panel); color: var(--text); }
.summary-cards { display: flex; gap: 8px; flex-wrap: wrap; justify-content: end; }
.summary-card { min-width: 88px; padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
.summary-card strong, .summary-card span { display: block; }
.summary-card strong { font-size: 18px; }
.summary-card span { color: var(--muted); font-size: 11px; }
main { display: grid; grid-template-columns: minmax(0, 1fr); gap: 22px; }

.slice-navigation button { border: 1px solid var(--accent); border-radius: 8px; padding: 8px 13px; background: transparent; color: var(--accent); }
.slice-navigation button:hover { background: #1d443e; }
.slice-navigation button:disabled { cursor: not-allowed; opacity: .35; }

.emotion-curve-section { position: relative; z-index: 2; min-width: 0; border: 1px solid var(--line); border-radius: 14px; padding: 18px; background: #101824; }
.emotion-curve-section .section-heading { align-items: start; }
.emotion-curve-canvas { position: relative; min-width: 0; overflow: visible; border: 1px solid var(--line); border-radius: 12px; background: #0a111b; }
.curve-reading-guide { margin: -3px 0 12px; color: var(--muted); line-height: 1.6; }
.experience-trend-summary { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.experience-trend-summary span, .experience-trend-summary > b { padding: 6px 9px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); font-size: 12px; }
.experience-trend-summary strong { color: var(--text); }
.experience-trend-summary .trend-rising { border-color: #66e3c477; color: var(--accent); }
.experience-trend-summary .trend-flat { color: #f4c95d; }
.experience-trend-summary .trend-falling { border-color: #ff836477; color: var(--hot); }
#emotion-curve-svg { width: 100%; height: clamp(480px, 42vw, 600px); }
.emotion-curve-chart { display: block; width: 100%; height: 100%; }
.emotion-positive-band { fill: #2b72531a; }
.emotion-negative-band { fill: #8c30401a; }
.emotion-axis-tick line { stroke: #34445a; stroke-width: 1; }
.emotion-axis-tick text { fill: var(--muted); font-size: 12px; text-anchor: end; }
.emotion-zero-axis { stroke: #d9e3f0; stroke-width: 1.5; stroke-dasharray: 5 5; opacity: .72; }
.emotion-time-label { fill: var(--muted); font-size: 11px; text-anchor: middle; }
.emotion-dimension-line, .emotion-composite-line { fill: none; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
.emotion-dimension-line { stroke-width: 2; opacity: .34; }
.emotion-composite-line { stroke: #fff; stroke-width: 4; filter: drop-shadow(0 0 5px #66e3c488); }
.global-emotion-line, .global-experience-line, .global-trend-line { fill: none; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
.global-emotion-line { stroke: #f4a261; stroke-width: 3; }
.global-experience-line { stroke: #65a9ff; stroke-width: 2; opacity: .7; }
.global-trend-line { stroke: #66e3c4; stroke-width: 5; filter: drop-shadow(0 0 5px #66e3c455); }
.global-emotion-point { stroke: #fff; stroke-width: 1.5; pointer-events: none; vector-effect: non-scaling-stroke; }
.global-emotion-point.valence-positive { fill: #58d68d; }
.global-emotion-point.valence-negative { fill: #ff6f91; }
.global-emotion-point.valence-mixed { fill: #f4c95d; }
.global-emotion-point.valence-neutral { fill: #94a6bd; }
.climax-marker { fill: none; stroke: #ff6f91; stroke-width: 2.5; pointer-events: none; vector-effect: non-scaling-stroke; }
.flow-marker { fill: #66e3c4; font-size: 18px; text-anchor: middle; pointer-events: none; }
.curve-slice-hit-zone { fill: transparent; stroke: transparent; stroke-width: 2; cursor: pointer; vector-effect: non-scaling-stroke; }
.curve-slice-hit-zone:hover, .curve-slice-hit-zone:focus { fill: #66e3c414; stroke: #66e3c455; outline: none; }
.curve-slice-hit-zone.filtered-out { opacity: .22; cursor: not-allowed; }
.curve-slice-guide { stroke: var(--accent); stroke-width: 1.5; opacity: 0; pointer-events: none; vector-effect: non-scaling-stroke; }
.curve-slice-hit-zone:hover + .curve-slice-guide,
.curve-slice-hit-zone:focus + .curve-slice-guide { opacity: .72; }
.emotion-curve-legend { display: flex; max-width: min(880px, 72vw); flex-direction: column; align-items: end; gap: 7px; }
.emotion-legend-series, .emotion-legend-actions { display: flex; flex-wrap: wrap; justify-content: end; gap: 6px; }
.emotion-legend-item, .emotion-legend-actions button { border: 1px solid var(--line); border-radius: 999px; padding: 5px 9px; background: var(--panel); color: var(--muted); font-size: 11px; }
.emotion-legend-item { opacity: .55; }
.emotion-legend-item.active { border-color: #ffffff55; color: var(--text); opacity: 1; }
.emotion-legend-item i, .emotion-tooltip-scores i { display: inline-block; width: 8px; height: 8px; margin-right: 6px; border-radius: 50%; }
.emotion-legend-actions button { color: var(--accent); }
.emotion-curve-tooltip { position: absolute; z-index: 6; width: min(430px, 80vw); padding: 12px; border: 1px solid #ffffff44; border-radius: 10px; background: #090e16f2; box-shadow: 0 12px 30px #000a; pointer-events: none; transform: translate(-50%, calc(-100% - 14px)); }
.emotion-curve-tooltip.below { transform: translate(-50%, 14px); }
.emotion-curve-tooltip > strong { color: var(--accent); }
.emotion-curve-tooltip p { margin: 9px 0 0; color: var(--text); line-height: 1.5; }
.emotion-tooltip-scores { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 5px 12px; margin-top: 9px; color: var(--muted); font-size: 11px; }
.emotion-tooltip-scores span { white-space: nowrap; }
.emotion-tooltip-scores strong { color: var(--text); }
.curve-tooltip-head { display: grid; gap: 5px; margin-top: 8px; color: var(--text); }
.experience-basis { display: grid; gap: 5px; margin-top: 9px; color: var(--muted); font-size: 11px; }
.experience-basis b { color: var(--text); }
.emotion-algorithm-details { margin-top: 10px; color: var(--muted); font-size: 12px; }
.emotion-algorithm-details summary { width: fit-content; cursor: pointer; color: var(--accent); }
.emotion-algorithm-details p { margin: 10px 0 0; line-height: 1.6; }
.emotion-weight-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.emotion-weight-list span { padding: 4px 7px; border-radius: 6px; background: var(--panel); }
.emotion-curve-error { margin: 10px 0 0; color: var(--hot); }

.section-heading, .detail-header { display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 12px; }
.timeline-meta, .slice-navigation { display: flex; align-items: center; gap: 9px; }
.pill { padding: 5px 9px; border-radius: 999px; background: #1d443e; color: var(--accent); font-size: 12px; }
.stage-summary { display: flex; max-width: 100%; min-width: 0; gap: 7px; flex-wrap: wrap; margin-bottom: 10px; }
.stage-summary button { display: grid; gap: 2px; border: 1px solid var(--line); border-radius: 9px; padding: 7px 10px; background: var(--panel); color: var(--text); text-align: left; }
.stage-summary button:hover { border-color: var(--accent); }
.stage-summary button span { color: var(--muted); font-size: 10px; }

.timeline { position: relative; width: 100%; min-width: 0; overflow: visible; border: 1px solid var(--line); border-radius: 12px; padding: 12px 12px 14px; background: var(--panel); }
.timeline-axis { position: relative; height: 28px; margin: 0 6px; border-bottom: 1px solid var(--line); }
.axis-mark { position: absolute; bottom: 5px; color: var(--muted); font-size: 10px; transform: translateX(-50%); }
.axis-mark:first-child { transform: none; }
.axis-mark:last-child { transform: translateX(-100%); }
.overview-track { position: relative; height: 86px; margin: 0 6px; background-image: linear-gradient(180deg, #ffffff05, transparent); }
.timeline-node { position: absolute; top: 10px; height: 58px; min-width: 1px; overflow: visible; border: 0; border-left: 1px solid #496078; padding: 7px 3px; background: #1c2b3d; color: var(--text); text-align: left; }
.timeline-node::before { position: absolute; top: -8px; left: 50%; width: 24px; height: 74px; content: ""; transform: translateX(-50%); }
.timeline-node:first-child { border-radius: 8px 0 0 8px; }
.timeline-node:last-child { border-radius: 0 8px 8px 0; }
.timeline-node:hover { z-index: 4; background: #263b51; }
.timeline-node.selected { z-index: 3; outline: 2px solid var(--accent); outline-offset: 2px; background: #264b49; }
.timeline-node > span:first-child { display: block; overflow: hidden; font-size: 10px; text-overflow: ellipsis; white-space: nowrap; }
.timeline-node.narrative-high { box-shadow: inset 0 -4px var(--hot); }
.timeline-node.narrative-low { box-shadow: inset 0 -4px var(--low); }
.timeline-node.flow-high { box-shadow: inset 0 -4px var(--flow); }
.timeline-milestone { position: absolute; z-index: 8; top: 0; bottom: 5px; width: 0; overflow: visible; border: 0; border-left: 3px solid #ffd166; padding: 0; background: transparent; color: #fff3c4; }
.timeline-milestone::after { position: absolute; top: 5px; left: -6px; width: 9px; height: 9px; border: 2px solid #1a2230; border-radius: 50%; background: #ffd166; content: ""; }
.timeline-milestone span { position: absolute; top: -4px; left: 5px; display: flex; gap: 5px; align-items: center; padding: 3px 6px; border: 1px solid #8b6d25; border-radius: 6px; background: #3d3219; box-shadow: 0 3px 12px #0008; font-size: 10px; font-weight: 800; white-space: nowrap; transform: translateY(-100%); }
.timeline-milestone b { color: #ffd166; font-size: 10px; }
.timeline-milestone:hover, .timeline-milestone:focus-visible { z-index: 10; border-left-color: #fff0a8; }
.node-tags { position: absolute; z-index: 5; top: 62px; left: 50%; display: flex; gap: 3px; transform: translateX(-50%); }
.node-tag { padding: 2px 4px; border-radius: 4px; background: #293a50; color: var(--text); font-size: 9px; font-style: normal; white-space: nowrap; }
.node-tag.narrative-high { background: #8b3f31; }
.node-tag.narrative-low { background: #68469a; }
.node-tag.flow-high { background: #315e91; }

.global-loop-section { position: relative; z-index: 1; min-width: 0; overflow: visible; border: 1px solid var(--line); border-radius: 14px; padding: 20px; background: #101824; }
.global-loop-section .section-heading > p { margin: 0; }
.global-loop-statistics { display: grid; gap: 10px; margin: 14px 0; }
.loop-stat-summary { display: flex; flex-wrap: wrap; gap: 10px; }
.loop-stat-summary > span { border: 1px solid var(--line); border-radius: 9px; padding: 7px 10px; background: var(--panel); color: var(--muted); font-size: 11px; }
.loop-stat-summary strong { margin-left: 5px; color: var(--text); font-size: 18px; }
.loop-family-stat-list { display: flex; flex-wrap: wrap; gap: 8px; min-width: 0; }
.loop-family-stat { --family-color: #66e3c4; display: grid; gap: 3px; border: 1px solid color-mix(in srgb, var(--family-color) 58%, var(--line)); border-radius: 10px; padding: 8px 11px; background: color-mix(in srgb, var(--family-color) 10%, #101824); }
.loop-family-stat strong { color: var(--family-color); font-size: 11px; }
.loop-family-stat span { color: var(--muted); font-size: 10px; white-space: nowrap; }
.family-accent-building-growth { --family-color: #45c7d8; }
.family-accent-building-production { --family-color: #65a9ff; }
.family-accent-expedition-progression { --family-color: #ff8a5b; }
.family-accent-hero-growth { --family-color: #aa82ff; }
.family-accent-law-system { --family-color: #ff6f91; }
.family-accent-heating-boost { --family-color: #f4c95d; }
.global-loop-legend { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 4px; }
.macro-loop-toggle { --macro-color: #45c7d8; display: grid; grid-template-columns: auto auto; align-items: center; gap: 2px 8px; border: 1px solid color-mix(in srgb, var(--macro-color) 60%, var(--line)); border-radius: 999px; padding: 6px 11px; background: color-mix(in srgb, var(--macro-color) 10%, #101824); color: var(--text); text-align: left; }
.macro-loop-toggle > span { grid-row: 1 / 3; width: 9px; height: 9px; border-radius: 50%; background: var(--macro-color); box-shadow: 0 0 10px color-mix(in srgb, var(--macro-color) 65%, transparent); }
.macro-loop-toggle strong { font-size: 11px; }
.macro-loop-toggle small { color: var(--muted); font-size: 9px; }
.macro-loop-toggle[aria-pressed="false"] { opacity: .42; filter: saturate(.45); }
.macro-toggle-expedition { --macro-color: #ff8a5b; }
.macro-toggle-hero-growth { --macro-color: #aa82ff; }
.macro-loop-show-all { border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px; background: #182435; color: var(--text); font-size: 11px; }
.macro-loop-show-all:hover, .macro-loop-show-all:focus { border-color: var(--accent); color: var(--accent); }
.global-loop-canvas { position: relative; min-width: 0; overflow: visible; }
.global-loop-nodes { position: relative; z-index: 2; display: grid; gap: 18px; width: min(1180px, 100%); margin: 0 auto; padding: 24px 0; }
.global-loop-nodes::before { position: absolute; z-index: -1; top: 0; bottom: 0; left: 23px; width: 2px; content: ""; background: linear-gradient(#65a9ff55, #66e3c4aa 50%, #f4c95d66); }
.global-flow-node { position: relative; min-width: 0; border-radius: 14px; color: var(--text); }
.global-flow-node[aria-disabled="true"] { cursor: not-allowed; filter: saturate(.45); opacity: .4; }
.global-flow-node:not([aria-disabled="true"]):hover,
.global-flow-node:not([aria-disabled="true"]):focus { outline: 2px solid var(--accent); outline-offset: 4px; }
.macro-loop-segment { --macro-color: #45c7d8; --macro-bg: #123841; position: relative; display: grid; gap: 12px; margin-left: 46px; border: 1px solid color-mix(in srgb, var(--macro-color) 52%, transparent); border-radius: 18px; padding: 12px; background: linear-gradient(100deg, color-mix(in srgb, var(--macro-bg) 78%, transparent), #111a27d9 76%); box-shadow: inset 4px 0 var(--macro-color), 0 10px 26px #0002; transition: opacity .18s, filter .18s; }
.macro-loop-segment::before { position: absolute; top: 26px; left: -30px; width: 18px; height: 2px; content: ""; background: var(--macro-color); }
.macro-segment-settlement { --macro-color: #45c7d8; --macro-bg: #123841; }
.macro-segment-expedition { --macro-color: #ff8a5b; --macro-bg: #40251f; }
.macro-segment-hero-growth { --macro-color: #aa82ff; --macro-bg: #2d2445; }
.macro-loop-dimmed { opacity: .25; filter: saturate(.35); }
.macro-segment-header { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
.macro-segment-header strong { color: var(--macro-color); font-size: 12px; letter-spacing: .08em; white-space: nowrap; }
.macro-segment-header span { overflow: hidden; color: var(--muted); font-size: 10px; text-overflow: ellipsis; white-space: nowrap; }
.macro-segment-nodes { display: grid; gap: 12px; }
.micro-loop-card { border: 1px solid color-mix(in srgb, var(--macro-color) 42%, var(--line)); padding: 12px 14px 14px; background: #101925e8; box-shadow: 0 8px 20px #0002; }
.micro-loop-card header { display: grid; grid-template-columns: auto auto 1fr; align-items: center; gap: 9px; }
.micro-loop-index { border-radius: 999px; padding: 3px 7px; background: var(--macro-color); color: #071017; font-size: 9px; font-weight: 900; letter-spacing: .08em; }
.micro-loop-card header h3 { font-size: 14px; white-space: nowrap; }
.micro-loop-card header small { justify-self: end; color: var(--muted); }
.micro-loop-card > p { margin: 6px 0 10px; color: var(--muted); font-size: 11px; }
.micro-loop-parts { display: grid; grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto minmax(0, 1fr) auto minmax(0, 1fr); align-items: stretch; gap: 8px; }
.global-loop-part { --part-color: #94a6bd; position: relative; display: grid; align-content: start; gap: 7px; min-width: 0; border: 1px solid color-mix(in srgb, var(--part-color) 58%, transparent); border-radius: 11px; padding: 12px; background: color-mix(in srgb, var(--part-color) 12%, #111927); }
.global-loop-part:focus, .global-loop-part:hover { outline: 1px solid var(--part-color); outline-offset: 2px; }
.global-loop-part strong { color: var(--part-color); font-size: 11px; letter-spacing: .08em; }
.global-loop-part span { line-height: 1.55; overflow-wrap: anywhere; }
.loop-part-motivation { --part-color: #f4c95d; }
.loop-part-behavior { --part-color: #818cf8; }
.loop-part-reward { --part-color: #58d68d; }
.loop-part-next { --part-color: #f4c95d; border-style: dashed; }
.global-loop-part-arrow { align-self: center; justify-self: center; color: var(--macro-color); font-size: 18px; }
.global-linear-node { justify-self: center; width: min(640px, calc(86% - 46px)); margin-left: 46px; border: 1px solid #60758f; padding: 13px 18px; background: #1a2636; text-align: center; box-shadow: 0 10px 24px #0003; }
.global-linear-node > span { color: var(--muted); font-size: 10px; letter-spacing: .1em; }
.global-linear-node h3 { margin-top: 5px; }
.global-linear-node p { margin: 6px 0; color: var(--muted); }
.global-linear-node.node-transition { border-color: #ff6f91; background: #321f2a; }
.global-linear-node.node-end { border-color: #f4c95d; background: #392f18; box-shadow: 0 0 24px #f4c95d24; }
.global-linear-node.node-outside_exit { border-style: dashed; opacity: .72; }
.global-flow-node.pending-confirmation::after { position: absolute; top: 8px; right: 10px; content: "待确认"; color: #f4c95d; font-size: 10px; }
.global-loop-connectors { position: absolute; z-index: 1; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
.global-loop-connector { fill: none; stroke: #7187a3; stroke-width: 2; vector-effect: non-scaling-stroke; }
.global-loop-connector.edge-macro_return { stroke-dasharray: 7 5; }
.global-loop-connector.macro-edge-settlement { stroke: #45c7d8; }
.global-loop-connector.macro-edge-expedition { stroke: #ff8a5b; }
.global-loop-connector.macro-edge-hero-growth { stroke: #aa82ff; }
.global-loop-connector.edge-cross_macro { stroke: #c6d1df; stroke-width: 1.5; }
.global-loop-connector.edge-conditional { stroke: #f4c95d; stroke-dasharray: 3 6; }
.macro-relation-dimmed { opacity: .16; }
.global-loop-edge-labels { position: relative; z-index: 3; display: flex; flex-wrap: wrap; justify-content: center; gap: 7px; margin-top: 18px; }
.global-loop-edge { border: 1px solid var(--line); border-radius: 999px; padding: 5px 9px; background: #121c29; color: var(--muted); font-size: 10px; }
.global-loop-edge.edge-primary { display: none; }
.global-loop-edge::before { content: "→ "; color: var(--accent); }
.global-loop-edge.edge-macro_return::before { content: "↺ "; }
.global-loop-edge.edge-conditional { border-style: dashed; }
.global-loop-error { color: var(--hot); }

.detail-panel { scroll-margin-top: 94px; border: 1px solid var(--line); border-radius: 14px; padding: 20px; background: #101824; }
.detail-header { align-items: center; }
.related-loop-navigation { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin: 12px 0 16px; }
.related-loop-label { color: var(--muted); font-size: 11px; letter-spacing: .08em; }
.related-loop-link { border: 1px solid var(--accent); border-radius: 999px; padding: 6px 10px; background: #18312f; color: var(--text); }
.related-loop-link:hover:not(:disabled), .related-loop-link:focus:not(:disabled) { background: #245047; }
.related-loop-link[aria-disabled="true"] { cursor: not-allowed; opacity: .38; }
.related-loop-empty { color: var(--muted); font-size: 11px; }
.loop-location-pulse { animation: loop-location-pulse 1.4s ease-out; }
@keyframes loop-location-pulse {
  0%, 35% { box-shadow: 0 0 0 4px #66e3c488, 0 0 28px #66e3c466; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.detail-content { display: grid; grid-template-columns: minmax(0, 1.8fr) minmax(220px, .7fr); gap: 16px; }
.image-shell { display: grid; place-items: center; }
.gallery { min-width: 0; touch-action: pan-y; user-select: none; }
.gallery-stage { position: relative; height: clamp(400px, 52vw, 620px); overflow: hidden; border: 1px solid var(--line); border-radius: 14px; background: radial-gradient(circle, #1f2b3b 0, #080c12 72%); }
.gallery-current { position: absolute; z-index: 3; inset: 18px 18%; min-height: 0; }
.gallery-current img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; border-radius: 10px; filter: drop-shadow(0 18px 30px #000a); cursor: zoom-in; }
.gallery-preview { position: absolute; z-index: 1; top: 14%; width: 34%; height: 72%; overflow: hidden; border: 1px solid #405069; border-radius: 12px; padding: 0; background: #080c12; opacity: .46; filter: blur(3px) brightness(.55); transform: scale(.88); transition: opacity .18s, filter .18s, transform .18s; }
.gallery-preview:hover { z-index: 2; opacity: .72; filter: blur(1px) brightness(.72); transform: scale(.92); }
.gallery-preview.previous { left: -7%; }
.gallery-preview.next { right: -7%; }
.gallery-preview img { width: 100%; height: 100%; object-fit: cover; }
.gallery-arrow { position: absolute; z-index: 5; top: 50%; width: 44px; height: 44px; border: 1px solid #ffffff55; border-radius: 50%; background: #0b1018cc; color: var(--text); font-size: 34px; line-height: 1; transform: translateY(-50%); }
.gallery-arrow:hover { border-color: var(--accent); color: var(--accent); }
.gallery-arrow.previous { left: 14px; }
.gallery-arrow.next { right: 14px; }
.gallery-footer { display: flex; align-items: center; justify-content: center; gap: 14px; min-height: 34px; padding-top: 8px; color: var(--muted); font-size: 12px; }
.gallery-dots { display: flex; gap: 7px; }
.gallery-dots button { width: 8px; height: 8px; border: 0; border-radius: 50%; padding: 0; background: #526176; }
.gallery-dots button.active { background: var(--accent); box-shadow: 0 0 0 3px #66e3c426; }
.image-error { color: #ff8f8f; font-weight: 700; }
.slice-meta { display: grid; align-content: start; gap: 12px; }
.confidence, .questions { padding: 14px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
.confidence { display: flex; align-items: center; justify-content: space-between; }
.confidence span, .questions li { color: var(--muted); }
.confidence strong { color: var(--accent); font-size: 26px; }
.questions h3 { margin-bottom: 8px; color: var(--accent); font-size: 14px; }
.questions ul { margin: 0; padding-left: 18px; }

.dimension-tabs { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }
.dimension-tab { border: 1px solid var(--line); border-radius: 999px; padding: 7px 11px; background: var(--panel); color: var(--text); }
.dimension-tab:hover:not(:disabled) { border-color: var(--accent); }
.dimension-tab.active { border-color: var(--accent); background: #1d443e; color: var(--accent); }
.dimension-tab:disabled { cursor: not-allowed; color: #5e6c7d; opacity: .55; }
.dimension-description { min-height: 92px; margin-top: 10px; padding: 17px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
.dimension-description p { margin: 0; line-height: 1.7; white-space: pre-wrap; }

.close-button { position: absolute; top: 12px; right: 14px; width: 36px; height: 36px; border: 1px solid var(--line); border-radius: 50%; background: var(--panel); color: var(--text); font-size: 24px; }
.lightbox { width: min(1100px, 94vw); border: 1px solid var(--line); border-radius: 14px; padding: 44px 16px 16px; background: #090d14; color: var(--text); }
.lightbox::backdrop { background: #000c; }
.lightbox img { display: block; max-width: 100%; max-height: 78vh; margin: auto; }
.load-error { position: fixed; z-index: 30; left: 50%; bottom: 20px; display: grid; gap: 8px; width: min(560px, 90vw); padding: 16px; border: 1px solid var(--hot); border-radius: 12px; background: #2c1717; transform: translateX(-50%); }
.load-error[hidden], [hidden] { display: none !important; }

@media (max-width: 820px) {
  .hero { align-items: start; flex-direction: column; }
  .hero-tools { width: 100%; justify-items: start; }
  .dataset-picker { width: min(100%, 320px); }
  .summary-cards { justify-content: start; }
  .hero, main { padding: 18px 14px; }
  .detail-content { grid-template-columns: 1fr; }
  .section-heading, .detail-header { align-items: start; flex-direction: column; }
  .timeline-meta { flex-wrap: wrap; }
  .emotion-curve-legend { max-width: 100%; align-items: start; }
  .emotion-legend-series, .emotion-legend-actions { flex-wrap: nowrap; max-width: 100%; justify-content: start; overflow-x: auto; padding-bottom: 4px; }
}

@media (max-width: 720px) {
  .global-loop-section { padding: 14px; }
  .loop-family-stat-list { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; }
  .loop-family-stat { flex: 0 0 auto; }
  .global-loop-legend { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; }
  .macro-loop-toggle { flex: 0 0 auto; }
  .global-loop-nodes { gap: 16px; }
  .global-loop-nodes::before { display: none; }
  .macro-loop-segment { margin-left: 0; padding: 10px; }
  .macro-loop-segment::before { display: none; }
  .macro-segment-header { align-items: start; flex-direction: column; gap: 3px; }
  .macro-segment-header span { white-space: normal; }
  .micro-loop-card header { grid-template-columns: auto 1fr; }
  .micro-loop-card header small { grid-column: 1 / -1; justify-self: start; }
  .micro-loop-parts { grid-template-columns: 1fr; gap: 10px; }
  .global-loop-part-arrow { width: auto; margin: -7px 0; transform: rotate(90deg); }
  .global-linear-node { width: 100%; margin-left: 0; }
  .global-loop-connectors { display: none; }
  .global-loop-edge-labels { align-items: stretch; flex-direction: column; }
  .global-loop-edge { border-radius: 8px; line-height: 1.45; }
}

@media (max-width: 540px) {
  .stage-summary { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; }
  .stage-summary button { flex: 0 0 auto; }
  .overview-track { height: 76px; }
  .timeline-node { height: 50px; }
  .node-tags { top: 54px; }
  #emotion-curve-svg { height: clamp(320px, 82vw, 420px); }
  .emotion-curve-section { padding: 14px; }
  .emotion-tooltip-scores { grid-template-columns: 1fr; }
  .emotion-curve-tooltip { position: fixed; left: 12px !important; right: 12px; top: auto !important; bottom: 12px; width: auto; max-height: 70vh; overflow-y: auto; transform: none !important; }
  .gallery-stage { height: 72vh; max-height: 620px; min-height: 380px; }
  .gallery-current { inset: 14px 10%; }
  .gallery-preview { width: 38%; opacity: .32; }
  .gallery-preview.previous { left: -16%; }
  .gallery-preview.next { right: -16%; }
  .gallery-arrow.previous { left: 8px; }
  .gallery-arrow.next { right: 8px; }
  .slice-navigation { width: 100%; }
  .slice-navigation button { flex: 1; }
}
</style>
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">EARLY EXPERIENCE REVIEW</p>
      <h1 id="game-title">游戏前期体验拆解</h1>
      <p id="video-overview" class="muted">正在读取 data.json…</p>
    </div>
    <div class="hero-tools">
      <label class="dataset-picker">
        <span>拆解项目</span>
        <select id="dataset-switch" aria-label="切换拆解项目"></select>
      </label>
      <div id="summary-cards" class="summary-cards" aria-label="视频概览"></div>
    </div>
  </header>

  <main>
    <section id="emotion-curve-section" class="emotion-curve-section" aria-labelledby="emotion-curve-title">
      <div class="section-heading">
        <div><p class="eyebrow">EMOTION & EXPERIENCE</p><h2 id="emotion-curve-title">全局情绪与体验曲线</h2></div>
        <div id="emotion-curve-legend" class="emotion-curve-legend" aria-label="情绪曲线图例"></div>
      </div>
      <p id="curve-reading-guide" class="curve-reading-guide">情绪曲线以剧情为主体，并补充环境压力等其他刺激；体验曲线用于判断玩法沉浸与心流强度；趋势线用于观察前期体验是否整体提升。</p>
      <div id="experience-trend-summary" class="experience-trend-summary" aria-label="体验整体趋势"></div>
      <div class="emotion-curve-canvas">
        <div id="emotion-curve-svg" aria-label="情绪强度、体验强度与体验趋势曲线"></div>
        <div id="emotion-curve-tooltip" class="emotion-curve-tooltip" role="tooltip" hidden></div>
      </div>
      <p id="emotion-curve-error" class="emotion-curve-error" hidden></p>
      <details id="emotion-algorithm-details" class="emotion-algorithm-details">
        <summary>双曲线评分口径</summary>
        <div id="emotion-algorithm-content"></div>
      </details>
    </section>

    <section class="timeline-section">
      <div class="section-heading">
        <div><p class="eyebrow">TIMELINE</p><h2>体验总览时间轴</h2></div>
        <div class="timeline-meta"><span id="time-granularity" class="pill"></span><span id="result-count" class="muted"></span></div>
      </div>
      <div id="stage-summary" class="stage-summary" aria-label="阶段快速跳转"></div>
      <div id="timeline" class="timeline" aria-label="全局时间轴">
        <div id="timeline-axis" class="timeline-axis"></div>
        <div id="overview-track" class="overview-track"></div>
      </div>
    </section>

    <section id="detail-panel" class="detail-panel" aria-live="polite">
      <header class="detail-header">
        <div>
          <p id="detail-time" class="eyebrow"></p>
          <h2 id="detail-title">选择一个时间片</h2>
        </div>
        <nav class="slice-navigation" aria-label="时间片导航">
          <button id="previous-slice" type="button">上一片</button>
          <button id="next-slice" type="button">下一片</button>
        </nav>
      </header>
      <div id="related-loop-navigation" class="related-loop-navigation"></div>
      <div id="detail-content" class="detail-content"></div>
      <div id="dimension-tabs" class="dimension-tabs" role="tablist" aria-label="七维描述"></div>
      <section id="dimension-description" class="dimension-description" role="tabpanel"></section>
    </section>

    <section id="global-loop-section" class="global-loop-section" aria-labelledby="global-loop-title">
      <div class="section-heading">
        <div><p class="eyebrow">GLOBAL GAMEPLAY LOOPS</p><h2 id="global-loop-title">全局 LOOP 流程</h2></div>
        <p class="muted">按实际时间串联小 LOOP；同色分段组成大 LOOP</p>
      </div>
      <div id="global-loop-statistics" class="global-loop-statistics"></div>
      <div id="global-loop-legend" class="global-loop-legend" aria-label="大 LOOP 筛选"></div>
      <div id="global-loop-canvas" class="global-loop-canvas"></div>
      <p id="global-loop-error" class="global-loop-error" hidden></p>
    </section>
  </main>

  <dialog id="lightbox" class="lightbox" aria-modal="true" aria-labelledby="lightbox-caption">
    <button id="close-lightbox" class="close-button" type="button" aria-label="关闭图片">×</button>
    <img id="lightbox-image" alt="放大的时间片截图">
    <p id="lightbox-caption"></p>
  </dialog>

  <div id="load-error" class="load-error" hidden>
    <strong>无法自动读取 data.json。</strong>
    <span>若直接双击打开本文件，请选择同目录中的 data.json。</span>
    <input id="data-file" type="file" accept=".json,application/json">
  </div>

  <script>(() => {
  "use strict";

  const DIMENSIONS = ["阶段目标", "任务链", "核心循环", "渐进体验", "地图体验", "经济体验", "剧情轴"];
  const CURVE_COLORS = {
    emotion: "#f4a261",
    experience: "#65a9ff",
    trend: "#66e3c4"
  };
  const DATASET_ID_PATTERN = /^[a-z0-9][a-z0-9-]{0,63}$/;
  const state = {
    data: null,
    visible: [],
    selectedIndex: 0,
    activeDimension: "",
    galleryIndex: 0,
    curveVisibility: null,
    curveModel: null,
    curveSize: "",
    loopModel: null,
    loopSize: "",
    macroLoopVisibility: null
  };
  let lightboxController;
  const byId = (id) => document.getElementById(id);
  const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (char) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[char]));
  const formatTime = (seconds) => {
    const total = Math.max(0, Number(seconds));
    const minutes = Math.floor(total / 60);
    const remainder = Math.floor(total % 60);
    return `${minutes}:${String(remainder).padStart(2, "0")}`;
  };
  const exactValue = (value) => String(value || "").trim().toLocaleLowerCase();
  function resolveAnalysisDataPath(search, configured = "data.json") {
    const dataset = new URLSearchParams(String(search || "")).get("dataset");
    return dataset && DATASET_ID_PATTERN.test(dataset)
      ? `data/${dataset}.json`
      : configured;
  }

  function resolveCurrentDatasetId(search, configured = "data.json") {
    const requested = new URLSearchParams(String(search || "")).get("dataset");
    if (requested && DATASET_ID_PATTERN.test(requested)) return requested;
    const configuredMatch = String(configured).match(
      /^data\/([a-z0-9][a-z0-9-]{0,63})\.json$/
    );
    return configuredMatch ? configuredMatch[1] : "";
  }

  function normalizeDatasetManifest(payload, currentId = "") {
    const datasets = Array.isArray(payload?.datasets) ? payload.datasets : [];
    const normalized = [];
    datasets.forEach((entry) => {
      const id = String(entry?.id || "");
      if (!DATASET_ID_PATTERN.test(id) || normalized.some((item) => item.id === id)) {
        return;
      }
      const label = String(entry?.label || "").trim() || id;
      normalized.push({ id, label });
    });
    if (
      DATASET_ID_PATTERN.test(currentId)
      && !normalized.some((item) => item.id === currentId)
    ) {
      normalized.push({ id: currentId, label: currentId });
    }
    return normalized;
  }

  function datasetSwitchTarget(href, datasetId) {
    if (!DATASET_ID_PATTERN.test(String(datasetId || ""))) return "";
    try {
      const target = new URL(String(href));
      target.searchParams.set("dataset", datasetId);
      return target.toString();
    } catch {
      return "";
    }
  }

  function computeTimelineLayout(duration, slices) {
    return {
      nodes: slices.map((slice) => ({
        left: slice.start / duration * 100,
        width: (slice.end - slice.start) / duration * 100
      }))
    };
  }

  function timelineMilestoneMarkup(milestones, duration) {
    if (!Array.isArray(milestones) || !(Number(duration) > 0)) return "";
    return milestones.map((milestone) => {
      const timestamp = Number(milestone?.timestamp);
      const sliceIndex = Number(milestone?.slice_index);
      if (!Number.isFinite(timestamp) || timestamp < 0 || timestamp > duration) {
        return "";
      }
      if (!Number.isInteger(sliceIndex) || sliceIndex < 0) return "";
      const type = String(milestone?.type || "").replaceAll("_", "-");
      const label = String(milestone?.label || "").trim();
      const note = String(milestone?.note || "").trim();
      const position = timestamp / duration * 100;
      const title = `${label} · ${formatTime(timestamp)}${note ? ` · ${note}` : ""}`;
      return `<button class="timeline-milestone ${escapeHtml(type)}" data-slice="${sliceIndex}" style="left:${position}%" type="button" title="${escapeHtml(title)}" aria-label="${escapeHtml(title)}">
        <span>${escapeHtml(label)}<b>${formatTime(timestamp)}</b></span>
      </button>`;
    }).join("");
  }

  function classifyHighlights(slice) {
    const labels = [];
    const narrative = exactValue(slice.narrative_climax.judgement);
    const flow = exactValue(slice.flow.judgement);
    if (narrative === "climax") labels.push("narrative-high");
    if (narrative === "low") labels.push("narrative-low");
    if (flow === "flow_peak") labels.push("flow-high");
    return labels;
  }

  function aggregateStages(slices) {
    const stages = new Map();
    slices.forEach((slice, index) => {
      const range = slice.stage_range;
      const key = `${range.name}\u0000${range.start}\u0000${range.end}`;
      if (!stages.has(key)) stages.set(key, { ...range, firstIndex: index, goals: [] });
      const goals = stages.get(key).goals;
      const goal = String(slice.dimensions["阶段目标"].fact || "").trim();
      if (goal && !goals.includes(goal)) goals.push(goal);
    });
    return [...stages.values()];
  }

  function dimensionTabs(slice, activeDimension = "") {
    const firstAvailable = DIMENSIONS.find((dimension) =>
      String(slice.dimensions[dimension]?.fact || "").trim()
    ) || "";
    const active = String(slice.dimensions[activeDimension]?.fact || "").trim()
      ? activeDimension
      : firstAvailable;
    return DIMENSIONS.map((dimension) => ({
      name: dimension,
      description: String(slice.dimensions[dimension]?.fact || "").trim(),
      disabled: !String(slice.dimensions[dimension]?.fact || "").trim(),
      active: dimension === active
    }));
  }

  function encodeAssetPath(path) {
    return String(path).split("/").map((segment) => encodeURIComponent(segment)).join("/");
  }

  function lightboxViewModel(frame) {
    return { src: encodeAssetPath(frame.path), caption: formatTime(frame.timestamp) };
  }

  function detailViewModel(slice, activeDimension = "") {
    const tabs = dimensionTabs(slice, activeDimension);
    const active = tabs.find((tab) => tab.active);
    return {
      slice,
      dimension: active?.name || "",
      description: active?.description || "",
      tabs,
      screenshots: [slice.main_frame, ...slice.evidence_frames.slice(0, 3)],
      confidence: Math.round(slice.confidence * 100),
      questions: slice.open_questions
    };
  }

  function imageMarkupPure(frame, className = "") {
    if (!frame) return "";
    const lightbox = lightboxViewModel(frame);
    return `<span class="image-shell ${className}"><img src="${escapeHtml(lightbox.src)}" data-lightbox="${escapeHtml(lightbox.src)}" data-caption="${lightbox.caption}" tabindex="0" role="button" aria-label="${escapeHtml(`放大截图 ${lightbox.caption}`)}" alt="${escapeHtml(`时间片截图 ${lightbox.caption}`)}" onerror="this.hidden=true;this.nextElementSibling.hidden=false"><span class="image-error" hidden>图片加载失败</span></span>`;
  }

  function adjacentGalleryIndex(current, direction, count) {
    if (count <= 1) return 0;
    return (current + direction + count) % count;
  }

  function galleryViewModel(frames, currentIndex = 0) {
    const count = frames.length;
    const current = count ? ((currentIndex % count) + count) % count : 0;
    return {
      count,
      currentIndex: current,
      current: frames[current],
      previousIndex: adjacentGalleryIndex(current, -1, count),
      nextIndex: adjacentGalleryIndex(current, 1, count)
    };
  }

  function galleryPreviewMarkup(frame, position, index) {
    const image = lightboxViewModel(frame);
    return `<button class="gallery-preview ${position}" type="button" data-gallery-index="${index}" aria-label="${position === "previous" ? "查看上一张截图" : "查看下一张截图"}"><img src="${escapeHtml(image.src)}" alt="" aria-hidden="true"></button>`;
  }

  function galleryHtml(frames, currentIndex = 0) {
    const gallery = galleryViewModel(frames, currentIndex);
    if (!gallery.count) return "";
    const multiple = gallery.count > 1;
    const dots = multiple
      ? `<div class="gallery-dots">${frames.map((_, index) => `<button type="button" data-gallery-index="${index}" class="${index === gallery.currentIndex ? "active" : ""}" aria-label="查看第 ${index + 1} 张截图" aria-current="${index === gallery.currentIndex}"></button>`).join("")}</div>`
      : "";
    return `<div class="gallery" data-gallery-current-index="${gallery.currentIndex}">
      <div class="gallery-stage">
        ${multiple ? galleryPreviewMarkup(frames[gallery.previousIndex], "previous", gallery.previousIndex) : ""}
        ${imageMarkupPure(gallery.current, "gallery-current")}
        ${multiple ? galleryPreviewMarkup(frames[gallery.nextIndex], "next", gallery.nextIndex) : ""}
        ${multiple ? `<button class="gallery-arrow previous" type="button" data-gallery-direction="-1" aria-label="上一张截图">‹</button><button class="gallery-arrow next" type="button" data-gallery-direction="1" aria-label="下一张截图">›</button>` : ""}
      </div>
      <div class="gallery-footer"><span>${gallery.currentIndex + 1} / ${gallery.count}</span>${dots}</div>
    </div>`;
  }

  function restoreGalleryFocus(container) {
    const currentImage = container.querySelector(".gallery-current [data-lightbox]");
    if (!currentImage) return false;
    currentImage.focus({ preventScroll: true });
    return true;
  }

  function tabsMarkup(tabs) {
    return tabs.map((tab) => `<button class="dimension-tab${tab.active ? " active" : ""}" type="button" role="tab" data-dimension="${escapeHtml(tab.name)}" aria-selected="${tab.active}" ${tab.disabled ? "disabled" : ""}>${escapeHtml(tab.name)}</button>`).join("");
  }

  function detailHtml(slice, activeDimension = "") {
    const detail = detailViewModel(slice, activeDimension);
    const questions = detail.questions.length
      ? `<section class="questions"><h3>待确认项</h3><ul>${detail.questions.map((question) => `<li>${escapeHtml(question)}</li>`).join("")}</ul></section>`
      : "";
    return `
      ${galleryHtml(detail.screenshots, 0)}
      <aside class="slice-meta">
        <div class="confidence"><span>置信度</span><strong>${detail.confidence}%</strong></div>
        ${questions}
      </aside>
      <div class="dimension-tabs" role="tablist">${tabsMarkup(detail.tabs)}</div>
      <section class="dimension-description" role="tabpanel"><p>${escapeHtml(detail.description)}</p></section>`;
  }

  function adjacentVisibleIndex(current, direction, visible) {
    let candidate = current + direction;
    while (candidate >= 0 && candidate < visible.length) {
      if (visible[candidate]) return candidate;
      candidate += direction;
    }
    return current;
  }

  function firstVisibleIndexInStage(stageName, slices, visible) {
    return slices.findIndex((slice, index) =>
      visible[index] && slice.stage_range.name === stageName
    );
  }

  function selectedIndexForVisible(current, visible) {
    if (current >= 0 && visible[current]) return current;
    return visible.findIndex(Boolean);
  }

  function timelineKeyDirection(event) {
    const tagName = String(event.target?.tagName || "").toUpperCase();
    if (["INPUT", "SELECT", "TEXTAREA"].includes(tagName) || event.target?.isContentEditable) return 0;
    if (event.key === "ArrowLeft") return -1;
    if (event.key === "ArrowRight") return 1;
    return 0;
  }

  function stageAverageExperienceObservations(
    slices,
    curvePoints,
    endTime = Number.POSITIVE_INFINITY
  ) {
    const stages = new Map();
    slices.forEach((slice, index) => {
      const range = slice.stage_range;
      const stageId = String(range.stage_id);
      if (!stages.has(stageId)) {
        stages.set(stageId, {
          time: (
            Number(range.start) + Math.min(Number(range.end), Number(endTime))
          ) / 2,
          total: 0,
          count: 0
        });
      }
      const stage = stages.get(stageId);
      stage.total += Number(curvePoints[index].experience.score);
      stage.count += 1;
    });
    return [...stages.entries()].map(([stageId, stage]) => ({
      time: stage.time,
      score: stage.total / stage.count,
      stageId,
      count: stage.count
    }));
  }

  function linearRegressionTrend(observations, min, max, predictionTimes = null) {
    if (!observations.length) {
      return {
        slope: 0,
        intercept: 0,
        predictions: [],
        rawOpeningPrediction: 0,
        rawEndingPrediction: 0,
        openingPrediction: 0,
        endingPrediction: 0,
        delta: 0,
        direction: "flat"
      };
    }
    const normalized = observations.map((item) => ({
      time: Number(item.time),
      score: Number(item.score)
    }));
    const meanX = normalized.reduce((sum, item) => sum + item.time, 0) / normalized.length;
    const meanY = normalized.reduce((sum, item) => sum + item.score, 0) / normalized.length;
    const denominator = normalized.reduce(
      (sum, item) => sum + (item.time - meanX) ** 2,
      0
    );
    const slope = denominator
      ? normalized.reduce(
        (sum, item) => sum + (item.time - meanX) * (item.score - meanY),
        0
      ) / denominator
      : 0;
    const intercept = meanY - slope * meanX;
    const predict = (time) => slope * Number(time) + intercept;
    const clamp = (value) => Math.min(Number(max), Math.max(Number(min), value));
    const outputTimes = Array.isArray(predictionTimes) && predictionTimes.length
      ? predictionTimes.map(Number)
      : normalized.map((item) => item.time);
    const rawOpeningPrediction = predict(outputTimes[0]);
    const rawEndingPrediction = predict(outputTimes[outputTimes.length - 1]);
    const openingPrediction = clamp(rawOpeningPrediction);
    const endingPrediction = clamp(rawEndingPrediction);
    const delta = endingPrediction - openingPrediction;
    return {
      slope,
      intercept,
      predictions: outputTimes.map((time) => clamp(predict(time))),
      rawOpeningPrediction,
      rawEndingPrediction,
      openingPrediction,
      endingPrediction,
      delta,
      direction: delta >= 0.5 ? "rising" : delta <= -0.5 ? "falling" : "flat"
    };
  }

  function defaultGlobalCurveVisibility() {
    return { emotion: true, experience: true, trend: true };
  }

  function updateGlobalCurveVisibility(current, action) {
    const next = { ...current };
    if (action.type === "toggle" && ["emotion", "experience", "trend"].includes(action.series)) {
      next[action.series] = !next[action.series];
    } else if (action.type === "all") {
      Object.keys(next).forEach((series) => { next[series] = true; });
    }
    return next;
  }

  function globalCurvesViewModel(data, width = 1000, height = 360) {
    width = Number(width);
    height = Number(height);
    const padding = { left: 54, right: 18, top: 36, bottom: 38 };
    const plotWidth = width - padding.left - padding.right;
    const plotHeight = height - padding.top - padding.bottom;
    const duration = Number(data.video.duration_seconds);
    const curve = data.global_curves;
    const min = Number(curve.scale.min);
    const max = Number(curve.scale.max);
    const scoreY = (score) => padding.top + (max - Number(score)) / (max - min) * plotHeight;
    const timeX = (seconds) => padding.left + Number(seconds) / duration * plotWidth;
    const slgMilestone = (data.timeline_milestones || []).find(
      (milestone) => milestone.type === "slg_entry"
    );
    const trendEndTime = slgMilestone
      ? Number(slgMilestone.timestamp)
      : duration;
    const trendEndSliceIndex = slgMilestone
      ? Number(slgMilestone.slice_index)
      : curve.points.length - 1;
    const trendSlices = data.slices.slice(0, trendEndSliceIndex + 1);
    const trendCurvePoints = curve.points.slice(0, trendEndSliceIndex + 1);
    const firstPredictionTime = (
      Number(curve.points[0].start) + Number(curve.points[0].end)
    ) / 2;
    const stageObservations = stageAverageExperienceObservations(
      trendSlices,
      trendCurvePoints,
      trendEndTime
    );
    const trendSummary = linearRegressionTrend(
      stageObservations,
      min,
      max,
      [firstPredictionTime, trendEndTime]
    );
    trendSummary.sampleBasis = "stage_average";
    trendSummary.sampleCount = stageObservations.length;
    trendSummary.endTime = trendEndTime;
    const predictTrend = (time) => Math.min(
      max,
      Math.max(min, trendSummary.slope * Number(time) + trendSummary.intercept)
    );
    const points = curve.points.map((point, index) => {
      const slice = data.slices[index];
      const midpoint = (Number(point.start) + Number(point.end)) / 2;
      const experienceTrend = index <= trendEndSliceIndex
        ? predictTrend(Math.min(midpoint, trendEndTime))
        : null;
      return {
        index,
        start: Number(point.start),
        end: Number(point.end),
        narrativeScore: Number(point.emotion.narrative_score),
        supportingScore: Number(point.emotion.supporting_score),
        emotionIntensity: Number(point.emotion.intensity),
        emotionDrivers: [...point.emotion.drivers],
        valence: point.emotion.valence,
        emotionEvent: point.emotion.event,
        emotionReason: point.emotion.reason,
        experienceScore: Number(point.experience.score),
        experienceTrend,
        experienceBasis: { ...point.experience.basis },
        experienceSummary: point.experience.summary,
        climax: exactValue(slice.narrative_climax.judgement) === "climax",
        flowPeak: exactValue(slice.flow.judgement) === "flow_peak",
        x: timeX(midpoint),
        y: {
          emotion: scoreY(point.emotion.intensity),
          experience: scoreY(point.experience.score),
          trend: experienceTrend === null ? null : scoreY(experienceTrend)
        }
      };
    });
    return {
      width,
      height,
      padding,
      plotWidth,
      plotHeight,
      min,
      max,
      duration,
      colors: { ...CURVE_COLORS },
      points,
      trendPoints: points.length ? [
        {
          x: timeX(firstPredictionTime),
          y: { trend: scoreY(trendSummary.openingPrediction) }
        },
        {
          x: timeX(trendEndTime),
          y: { trend: scoreY(trendSummary.endingPrediction) }
        }
      ] : [],
      trendEndTime,
      trendEndSliceIndex,
      trendSummary
    };
  }

  function curvePath(points, name) {
    return points.map((point, index) =>
      `${index ? "L" : "M"}${point.x.toFixed(2)},${point.y[name].toFixed(2)}`
    ).join(" ");
  }

  function curveSliceBands(model) {
    const plotLeft = model.padding.left;
    const plotRight = model.width - model.padding.right;
    return model.points.map((point, index) => {
      const previous = model.points[index - 1];
      const following = model.points[index + 1];
      const left = previous ? (previous.x + point.x) / 2 : plotLeft;
      const right = following ? (point.x + following.x) / 2 : plotRight;
      return {
        index: point.index,
        left,
        right,
        top: model.padding.top,
        width: right - left,
        height: model.plotHeight,
        center: point.x
      };
    });
  }

  function curveSliceInteractionState(index, selectedIndex, visible) {
    return {
      selected: index === selectedIndex,
      filteredOut: !visible[index],
      disabled: !visible[index]
    };
  }

    }).join("");
    const labelStep = Math.max(1, Math.ceil(model.points.length / 12));
    const timeLabels = model.points.map((point, index) =>

    ).join("");
    const emotionLine = visibility.emotion

      : "";
    const experienceLine = visibility.experience
      ? `<path class="global-experience-line" d="${curvePath(model.points, "experience")}"></path>`
      : "";
    const trendLine = visibility.trend
      ? `<path class="global-trend-line" d="${curvePath(model.trendPoints, "trend")}"></path>`
      : "";
    const emotionNodes = visibility.emotion
      ? model.points.map((point) =>
        `<circle class="global-emotion-point valence-${escapeHtml(point.valence)}" cx="${point.x}" cy="${point.y.emotion}" r="5"></circle>`
      ).join("")
      : "";
    const climaxMarkers = visibility.emotion ? model.points.filter((point) => point.climax).map((point) =>
      `<rect class="climax-marker" x="${point.x - 6}" y="${point.y.emotion - 6}" width="12" height="12" transform="rotate(45 ${point.x} ${point.y.emotion})"></rect>`
    ).join("") : "";
    const flowMarkers = visibility.experience ? model.points.filter((point) => point.flowPeak).map((point) =>
      `<text class="flow-marker" x="${point.x}" y="${Math.max(model.padding.top + 18, point.y.experience - 9)}">★</text>`
    ).join("") : "";
    const bands = curveSliceBands(model);
    const nodes = bands.map((band, index) => {
      const point = model.points[index];
      return `<rect class="curve-slice-hit-zone" data-curve-slice="${point.index}" x="${band.left}" y="${band.top}" width="${band.width}" height="${band.height}" tabindex="0" role="button" aria-describedby="emotion-curve-tooltip" aria-label="${escapeHtml(`${formatTime(point.start)} 至 ${formatTime(point.end)}，情绪强度 ${point.emotionIntensity.toFixed(1)}，体验强度 ${point.experienceScore.toFixed(1)}`)}"></rect><line class="curve-slice-guide" x1="${band.center}" x2="${band.center}" y1="${band.top}" y2="${band.top + band.height}"></line>`;
    }).join("");
    return `<svg class="emotion-curve-chart" viewBox="0 0 ${model.width} ${model.height}" role="img" aria-label="全局情绪与体验曲线">
      ${axisTicks}
      ${timeLabels}
      ${emotionLine}${experienceLine}${trendLine}
      ${emotionNodes}${climaxMarkers}${flowMarkers}
      ${nodes}
    </svg>`;
  }

  function curveTooltipPlacement(
    point,
    model,
    containerWidth = model.width,
    tooltipWidth = 430
  ) {
    const topY = Math.min(point.y.emotion, point.y.experience);
    const horizontalMargin = 8;
    const halfWidth = Math.min(
      Number(tooltipWidth) / 2,
      Math.max(0, Number(containerWidth) / 2 - horizontalMargin)
    );
    const rawLeftPx = point.x / model.width * Number(containerWidth);
    const leftPx = Math.min(
      Number(containerWidth) - halfWidth - horizontalMargin,
      Math.max(halfWidth + horizontalMargin, rawLeftPx)
    );
    const leftPercent = Number(containerWidth)
      ? leftPx / Number(containerWidth) * 100
      : 50;
    const topPercent = topY / model.height * 100;
    return {
      leftPx,
      leftPercent,
      topPercent,
      below: topPercent < 30
    };
  }

  function createLightboxController(elements) {
    const {
      lightbox, lightboxClose, lightboxImage, lightboxCaption, documentRef
    } = elements;
    let lightboxTrigger = null;
    function openLightbox(trigger, src, caption) {
      lightboxTrigger = trigger || null;
      lightboxImage.hidden = false;
      lightboxImage.src = src;
      lightboxCaption.textContent = caption;
      lightbox.showModal();
      lightboxClose.focus();
    }
    function closeLightbox() {
      if (lightbox.open) lightbox.close();
      if (lightboxTrigger) lightboxTrigger.focus();
      lightboxTrigger = null;
    }
    function activateImage(event) {
      if (event.type === "keydown" && !["Enter", " "].includes(event.key)) return;
      const image = event.target.closest("[data-lightbox]");
      if (!image) return;
      event.preventDefault();
      openLightbox(image, image.dataset.lightbox, image.dataset.caption);
    }
    lightboxClose.addEventListener("click", closeLightbox);
    lightbox.addEventListener("cancel", (event) => {
      event.preventDefault();
      closeLightbox();
    });
    documentRef.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && lightbox.open) {
        event.preventDefault();
        closeLightbox();
      }
    });
    return { activateImage, openLightbox, closeLightbox };
  }

  function loopFamilyStatistics(graph) {

      .filter((family) => counts.has(family.id))
      .map((family) => ({
        ...family,
        occurrences: counts.get(family.id),

      }));
    return {
      eventCount: microLoops.length,
      uniqueCount: families.length,

    };

  function macroLoopSegments(nodes) {
    const counters = {};
    const segments = [];
    let active = null;
    nodes.forEach((node) => {
      if (node.type !== "micro_loop") {
        active = null;
        return;
      }
      if (!active || active.macroLoopId !== node.macro_loop_id) {
        const sequence = counters[node.macro_loop_id] || 0;
        counters[node.macro_loop_id] = sequence + 1;
        active = {
          id: `${node.macro_loop_id}:${sequence}`,
          macroLoopId: node.macro_loop_id,
          nodeIds: []
        };
        segments.push(active);
      }
      active.nodeIds.push(node.id);
    });
    return segments;
  }

  function hierarchicalLoopsViewModel(data, visible, macroVisibility) {
    const graph = data.global_loops;
    const macroById = Object.fromEntries(
      graph.macro_loops.map((macro) => [macro.id, macro])
    );
    const titleById = Object.fromEntries(
      graph.nodes.map((node) => [node.id, node.title])
    );
    const macroIdByNode = Object.fromEntries(
      graph.nodes.map((node) => [node.id, node.macro_loop_id])
    );
    const nodes = graph.nodes.map((node) => {
      const interaction = globalLoopInteractionState(node.slice_indices, visible);
      const referencedSlices = node.slice_indices.map((index) => data.slices[index]);
      const timeRange = `${formatTime(Math.min(...referencedSlices.map((slice) => slice.start)))}–${formatTime(Math.max(...referencedSlices.map((slice) => slice.end)))}`;
      const macro = node.macro_loop_id ? macroById[node.macro_loop_id] : null;
      return {
        ...node,
        ...interaction,
        macro,
        accent: macro?.accent || "",
        dimmed: Boolean(macro && macroVisibility[macro.id] === false),
        timeLabel: referencedSlices.length === 1
          ? timeRange
          : `${timeRange} · ${referencedSlices.length}个片段`,
        evidence: [...node.evidence_frames],
        parts: node.type === "micro_loop" ? [
          { key: "motivation", label: "动机", values: [node.motivation] },
          { key: "behavior", label: "行为", values: node.behaviors },
          { key: "reward", label: "奖励", values: [node.reward] },
          { key: "next", label: "下一动机", values: [node.next_motivation] }
        ] : []
      };
    });
    const segments = macroLoopSegments(nodes).map((segment) => ({
      ...segment,
      macro: macroById[segment.macroLoopId],
      dimmed: macroVisibility[segment.macroLoopId] === false
    }));
    const segmentIdByNode = Object.fromEntries(
      segments.flatMap((segment) =>
        segment.nodeIds.map((nodeId) => [nodeId, segment.id])
      )
    );
    nodes.forEach((node) => {
      node.segmentId = segmentIdByNode[node.id] || "";
    });
    const edges = graph.edges.map((edge) => {
      const fromMacroId = macroIdByNode[edge.from];
      const toMacroId = macroIdByNode[edge.to];
      return {
        ...edge,
        fromTitle: titleById[edge.from],
        toTitle: titleById[edge.to],
        fromMacroId,
        toMacroId,
        dimmed: Boolean(
          (fromMacroId && macroVisibility[fromMacroId] === false)
          || (toMacroId && macroVisibility[toMacroId] === false)
        ),
        mobileLabel: `${titleById[edge.from]} → ${titleById[edge.to]}：${edge.label}`
      };
    });
    return {
      scope: graph.scope,
      macros: graph.macro_loops.map((macro) => ({
        ...macro,
        visible: macroVisibility[macro.id] !== false
      })),
      nodes,
      segments,
      edges,
      relationEdges: edges.filter((edge) => edge.kind !== "primary")
    };
  }
